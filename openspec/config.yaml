schema: spec-driven

context: |
  Project: context-eval
  Purpose: Compare how context assets affect coding agent task outcomes in local Git repositories.
  Primary language: English project documentation, with user-facing conversation in Chinese when requested.
  Initial focus: Local-only evaluation workflows, deterministic artifacts, noninteractive coding-agent commands, and local web UI ergonomics.
  Constraints:
    - Keep context-eval local-only and artifact-based; do not turn results into an absolute agent benchmark.
    - Prefer explicit specs, tests, implementation, docs, and verification for every capability PR.
    - Preserve deterministic outputs from results.jsonl, run_metadata.json, and run_manifest.json.
    - Do not add hosted dashboards, automatic commits, LLM judges, or automatic coding-agent installation without a new accepted spec.

rules:
  proposal:
    - Keep proposals concise and include non-goals when useful.
    - Call out local-only boundaries, artifact sources, and compatibility impact.
  tasks:
    - Break work into small verifiable steps.
    - Include file paths and validation commands when implementation is expected.

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
