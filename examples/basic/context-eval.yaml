repo:
  path: "../fixture-repo"
  base_ref: "main"

agent:
  name: "example-agent"
  command: "python scripts/example_agent.py \"{prompt_file}\""
  timeout_minutes: 5
  network: "disabled"

tasks: "./tasks.yaml"

variants:
  baseline:
    description: "Original AGENTS.md"
    overlays:
      - source: "./contexts/baseline/AGENTS.md"
        target: "AGENTS.md"

  experiment:
    description: "Optimized AGENTS.md with DeepWiki"
    overlays:
      - source: "./contexts/experiment/AGENTS.md"
        target: "AGENTS.md"
      - source: "./contexts/experiment/docs"
        target: "docs/deepwiki"

evaluation:
  commands:
    - "python -m pytest"
