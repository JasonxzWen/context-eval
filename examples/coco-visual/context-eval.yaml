repo:
  path: "../fixture-repo"
  base_ref: "main"

agents:
  coco:
    kind: "coco"
    command: "coco -y --query-timeout 10m --bash-tool-timeout 5m -p \"{prompt}\""
    timeout_minutes: 60
    network: "disabled"
    telemetry:
      collector: "json-file"
      file: "telemetry.json"

tasks: "./tasks.yaml"
output_dir: ".context-eval/runs"

variants:
  baseline:
    description: "Baseline Coco instructions"
    overlays:
      - source: "./contexts/baseline/AGENTS.md"
        target: "AGENTS.md"

  experiment:
    description: "Coco instructions with expected-outcome focus"
    overlays:
      - source: "./contexts/experiment/AGENTS.md"
        target: "AGENTS.md"

evaluation:
  timeout_seconds: 60
  commands:
    - "python -m pytest"
