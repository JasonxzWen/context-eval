repo:
  path: "../fixture-repo"
  base_ref: "main"

agents:
  codex:
    kind: "codex-cli"
    command: "codex exec --json --sandbox workspace-write --output-last-message \"{output_dir}/codex-final-message.md\" -C \"{workspace}\" - < \"{prompt_file}\""
    timeout_minutes: 60
    network: "disabled"
    telemetry:
      collector: "codex-jsonl"
      file: "codex-events.jsonl"

  claude:
    kind: "claude-code"
    command: "claude -p {prompt_file}"
    timeout_minutes: 60
    network: "disabled"

  trae:
    kind: "traecli"
    command: "traecli -p \"{prompt}\""
    timeout_minutes: 60
    network: "disabled"

  coco:
    kind: "coco"
    command: "coco -y --query-timeout 10m --bash-tool-timeout 5m -p \"{prompt}\""
    timeout_minutes: 60
    network: "disabled"

tasks: "./tasks.yaml"

variants:
  baseline:
    description: "Original AGENTS.md"
    overlays:
      - source: "./contexts/baseline/AGENTS.md"
        target: "AGENTS.md"

  experiment:
    description: "Optimized AGENTS.md for matrix comparison"
    overlays:
      - source: "./contexts/experiment/AGENTS.md"
        target: "AGENTS.md"

evaluation:
  timeout_seconds: 30
  commands:
    - "python -m pytest"
