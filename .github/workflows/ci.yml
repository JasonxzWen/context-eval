name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest

      - name: Run ruff
        run: ruff check .

      - name: Validate example config
        run: context-eval validate-config --config examples/basic/context-eval.yaml

  local-e2e:
    name: Local E2E smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run local-e2e smoke
        run: python -m pytest tests/test_local_e2e_smoke.py -m local_e2e

  skill-validation:
    name: Skill validation
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Validate vendored skills
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts\validate-skills.ps1 -SkipExternal

  package-build:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package build and runtime smoke dependencies
        run: python -m pip install "build>=1" "typer>=0.12" "pydantic>=2" "PyYAML>=6" "rich>=13" "Jinja2>=3"

      - name: Prepare release artifacts
        run: python scripts/prepare-release.py --dist-dir dist
