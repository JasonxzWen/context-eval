<!doctype html>
<!-- 用途：实现交付报告，包含改动区域、文件证据、验证门禁、风险和下一步行动。 -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实现交付报告</title>
  <style>
    :root { color-scheme: light; --bg:#f7f8fb; --panel:#fff; --ink:#172033; --muted:#667085; --line:#d7dce5; --accent:#2563eb; --ok:#16845b; --warn:#b7791f; --shadow:0 14px 40px rgba(23,32,51,.12); }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.45; }
    .shell { width:min(1180px,calc(100vw - 32px)); margin:0 auto; padding:28px 0 44px; }
    header,.panel,.card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
    h1,h2,p { margin-top:0; }
    h1 { font-size:clamp(28px,4vw,42px); line-height:1.05; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
    .card { transition:transform 160ms ease, opacity 160ms ease, filter 160ms ease, border-color 160ms ease, box-shadow 160ms ease; }
    .grid:has(.card:hover) .card:not(:hover) { opacity:.4; filter:grayscale(.65) blur(1px); }
    .card:hover,.card:focus-within { border-color:var(--accent); box-shadow:var(--shadow); transform:translateY(-2px); }
    .chip { display:inline-flex; min-height:28px; align-items:center; padding:4px 9px; border:1px solid var(--line); border-radius:999px; background:#f9fafc; }
    .ok { color:var(--ok); border-color:color-mix(in srgb,var(--ok) 35%,var(--line)); }
    .warn { color:var(--warn); border-color:color-mix(in srgb,var(--warn) 35%,var(--line)); }
    button { min-height:36px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); padding:7px 11px; font:inherit; cursor:pointer; }
    button:hover { border-color:var(--accent); background:#eef4ff; }
    button:focus-visible,a:focus-visible { outline:3px solid color-mix(in srgb,var(--accent) 35%,transparent); outline-offset:2px; }
    @media (max-width:720px) { .shell{width:min(100vw - 20px,1180px); padding-top:14px;} }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after{transition:none!important;animation:none!important;} .card:hover{transform:none;} }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <span class="chip ok">实现交付</span>
      <h1>替换为变更名称</h1>
      <p>先给结论；细节放在卡片、证据和验证门禁里。</p>
    </header>
    <section class="grid" style="margin-top:12px">
      <article class="card"><h2>改动区域</h2><ul><li>区域和结果。</li></ul></article>
      <article class="card"><h2>证据</h2><ul><li>文件或命令锚点。</li></ul></article>
      <article class="card"><h2>验证</h2><ul><li><span class="chip ok">通过</span> 门禁结果。</li></ul></article>
      <article class="card"><h2>风险</h2><ul><li><span class="chip warn">关注</span> 约束或 caveat。</li></ul></article>
    </section>
  </main>
  <script>
    document.addEventListener("click", function (event) {
      var button = event.target.closest("[data-copy-text]");
      if (!button || !navigator.clipboard) return;
      navigator.clipboard.writeText(button.getAttribute("data-copy-text") || "");
    });
  </script>
</body>
</html>
